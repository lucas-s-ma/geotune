# Main configuration for GeoTune

# Model configuration
model:
  model_name: "facebook/esm2_t6_8M_UR50D"  # Base ESM2 model (8M parameters)
  # Other options: facebook/esm2_t12_35M_UR50D, facebook/esm2_t30_150M_UR50D, facebook/esm2_t33_650M_UR50D
  constraint_weight: 5.0  # Weight for geometric constraint loss

# LoRA configuration
lora:
  r: 8                    # LoRA attention dimension
  alpha: 16               # LoRA scaling factor
  dropout: 0.1            # LoRA dropout rate
  target_modules:         # Modules to apply LoRA to
    - "query"
    - "key"
    - "value"
    - "dense"
    - "intermediate.dense"
    - "output.dense"

# Training configuration
training:
  batch_size: 8           # Batch size
  gradient_accumulation_steps: 4  # Accumulate gradients (effective batch_size = 8 * 4 = 32)

  # Learning rates - use primal_lr and dual_lr for clarity
  primal_lr: 1e-4         # Learning rate for primal task (ESM model + MLM head + dihedral + alignment)
  dual_lr: 5e-1           # Learning rate for dual task (Lagrange multipliers in constrained training)
  learning_rate: 1e-4     
  
  num_epochs: 50          # Number of training epochs
  warmup_steps: 100       # Warmup steps for scheduler
  max_seq_len: 512        # Maximum sequence length
  seed: 1644              # Random seed

  # Output directories
  output_dir: "outputs_unconstrained"   # Base output directory

  # Checkpoint settings
  checkpoint_frequency: 1  # Save checkpoint every N epochs

  # Memory optimization
  use_gradient_checkpointing: true   # Enable gradient checkpointing to save memory
  mixed_precision: false             # Use fp16 mixed precision training

  # Masking and loss weights
  mask_ratio: 0.15                   # Mask ratio for MLM task
  struct_align_weight: 0.1           # Weight for structure alignment loss

# Data configuration
data:
  data_path: "data/processed"
  use_precomputed_embeddings: true   # Use cached embeddings if available
  num_workers: 2                     # Number of data loading workers
  subset_fraction: 1.0               # Fraction of dataset to use (for debugging)

# Data pipeline configuration
data_pipeline:
  embedding_dim: 320      # Dimension of GearNet embeddings (must match ESM2 hidden_size)
  foldseek_db_path: "data/foldseek_db"

# Evaluation configuration
evaluation:
  eval_data_path: "data/processed_test"
  eval_batch_size: 8

# Logging configuration
logging:
  use_wandb: true
  project_name: "geotune"
  lambda_log_frequency: 1  # Log lambda distributions every N epochs (constrained training only)

# Constraint configuration (for constrained training)
constraints:
  distance_weight: 1.0
  angle_weight: 0.5
  neighborhood_weight: 0.5
  use_structure_alignment: true

  # NOTE: Epsilon values for constrained training are now passed via CLI args only
  # dihedral_epsilon, gnn_epsilon, foldseek_epsilon are NOT stored in config
